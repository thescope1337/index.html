/* Page Loader */
.page-loader {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #08080f 0%, #0a0a12 100%);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.page-loader.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.loader-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  animation: loaderFadeIn 0.4s ease-out;
}
.loader-logo {
  font-family: 'Cinzel', serif;
  font-size: 48px;
  font-weight: 900;
  color: #c9a96e;
  letter-spacing: 10px;
  text-transform: uppercase;
  text-shadow: 0 0 40px rgba(201,169,110,0.25), 0 2px 4px rgba(0,0,0,0.5);
  line-height: 1;
}
.loader-sub {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: #8b7355;
  letter-spacing: 8px;
  text-transform: uppercase;
  font-weight: 500;
  margin-top: 2px;
}
.loader-line-wrap {
  width: 140px;
  height: 2px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  margin-top: 8px;
}
.loader-line {
  position: absolute;
  top: 0;
  left: -40%;
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.8), #c9a96e, rgba(201,169,110,0.8), transparent);
  animation: loaderSlide 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
@keyframes loaderFadeIn {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes loaderSlide {
  0% { left: -40%; }
  100% { left: 100%; }
}


@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #08080f;
  color: #e8e6e3;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 0%, rgba(201, 169, 110, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(139, 115, 85, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.header {
  background: linear-gradient(180deg, #0d0d18 0%, #08080f 100%);
  border-bottom: 1px solid #1f1b16;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  font-weight: 900;
  color: #c9a96e;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 30px rgba(201, 169, 110, 0.25), 0 2px 4px rgba(0,0,0,0.5);
  line-height: 1;
}

.logo-main {
  position: relative;
  display: inline-block;
  overflow: hidden;
  font-family: 'Cinzel', serif;
  font-size: 32px;
  font-weight: 900;
  color: #c9a96e;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 30px rgba(201, 169, 110, 0.25), 0 2px 4px rgba(0,0,0,0.5);
  line-height: 1;
  vertical-align: top;
}

.logo-main::before {
  content: '';
  position: absolute;
  top: 0;
  left: -35%;
  width: 35%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255, 255, 255, 0) 25%,
    rgba(255, 255, 255, 0.6) 50%,
    rgba(255, 255, 255, 0) 75%,
    transparent 100%
  );
  transform: skewX(-18deg);
  mix-blend-mode: overlay;
  animation: logoShine 9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  pointer-events: none;
  z-index: 2;
  will-change: transform;
  transform: translateZ(0);
}

@keyframes logoShine {
  0% {
    left: -35%;
  }
  40% {
    left: 100%;
  }
  100% {
    left: 100%;
  }
}

.logo-sub {
  color: #8b7355;
  font-size: 11px;
  display: block;
  letter-spacing: 8px;
  margin-top: 2px;
  font-weight: 500;
}

.nav {
  display: flex;
  gap: 6px;
  background: linear-gradient(180deg, rgba(20,20,28,0.85) 0%, rgba(12,12,18,0.9) 100%);
  padding: 6px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.035);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  position: relative;
  overflow: hidden;
}
.nav::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;

/* ===== SHINE + WAVE EFFECTS FOR CATEGORY TABS ===== */

/* ===== WEAPON ===== */
.cat-tab.weapon {
  position: relative;
  overflow: hidden;
}
/* Hover shine sweep - uses animation so it completes even after activation */
.cat-tab.weapon::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(201, 169, 110, 0.08) 40%,
    rgba(201, 169, 110, 0.18) 50%,
    rgba(201, 169, 110, 0.08) 60%,
    transparent 100%
  );
  transform: skewX(-20deg);
  pointer-events: none;
  z-index: 2;
}
.cat-tab.weapon:hover::before {
  animation: weaponShine 0.6s ease forwards;
}
/* Active continuous wave */
.cat-tab.weapon.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: -60%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(201, 169, 110, 0.06) 30%,
    rgba(201, 169, 110, 0.14) 50%,
    rgba(201, 169, 110, 0.06) 70%,
    transparent 100%
  );
  transform: skewX(-20deg);
  animation: weaponWave 2.5s ease-in-out infinite;
  pointer-events: none;
  z-index: 2;
}

/* ===== VITALITY ===== */
.cat-tab.vitality {
  position: relative;
  overflow: hidden;
}
/* Hover shine sweep */
.cat-tab.vitality::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(76, 175, 80, 0.08) 40%,
    rgba(76, 175, 80, 0.18) 50%,
    rgba(76, 175, 80, 0.08) 60%,
    transparent 100%
  );
  transform: skewX(-20deg);
  pointer-events: none;
  z-index: 2;
}
.cat-tab.vitality:hover::before {
  animation: vitalityShine 0.6s ease forwards;
}
/* Active continuous wave */
.cat-tab.vitality.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: -60%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(76, 175, 80, 0.06) 30%,
    rgba(76, 175, 80, 0.14) 50%,
    rgba(76, 175, 80, 0.06) 70%,
    transparent 100%
  );
  transform: skewX(-20deg);
  animation: vitalityWave 2.5s ease-in-out infinite;
  pointer-events: none;
  z-index: 2;
}

/* ===== SPIRIT ===== */
.cat-tab.spirit {
  position: relative;
  overflow: hidden;
}
/* Hover shine sweep */
.cat-tab.spirit::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(156, 39, 176, 0.08) 40%,
    rgba(156, 39, 176, 0.18) 50%,
    rgba(156, 39, 176, 0.08) 60%,
    transparent 100%
  );
  transform: skewX(-20deg);
  pointer-events: none;
  z-index: 2;
}
.cat-tab.spirit:hover::before {
  animation: spiritShine 0.6s ease forwards;
}
/* Active continuous wave */
.cat-tab.spirit.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: -60%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(156, 39, 176, 0.06) 30%,
    rgba(156, 39, 176, 0.14) 50%,
    rgba(156, 39, 176, 0.06) 70%,
    transparent 100%
  );
  transform: skewX(-20deg);
  animation: spiritWave 2.5s ease-in-out infinite;
  pointer-events: none;
  z-index: 2;
}

/* ===== KEYFRAMES ===== */
@keyframes weaponShine {
  0% { left: -100%; }
  100% { left: 150%; }
}
@keyframes vitalityShine {
  0% { left: -100%; }
  100% { left: 150%; }
}
@keyframes spiritShine {
  0% { left: -100%; }
  100% { left: 150%; }
}
@keyframes weaponWave {
  0% { left: -60%; }
  100% { left: 160%; }
}
@keyframes vitalityWave {
  0% { left: -60%; }
  100% { left: 160%; }
}
@keyframes spiritWave {
  0% { left: -60%; }
  100% { left: 160%; }
}

/* Bars */
.stat-bar-bg {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  margin-top: 8px;
  overflow: hidden;
}

  height: 100%;
  border-radius: 3px;

}

.stat-bar-fill.stamina { background: linear-gradient(90deg, #616161, #e8e6e3); }

/* Liquid Glass Section Transitions */
.section-animate {
  animation: sectionFadeIn 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes sectionFadeIn {
  from {
    opacity: 0;
    transform: translateY(14px) scale(0.985);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Liquid Glass Modal Enhancement */
.hero-detail-modal, .item-detail-modal {
  /* backdrop-filter disabled for performance - blur handled by overlay */
  transform: translateZ(0);
}

@media (max-width: 768px) {
  .heroes-grid, .items-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
  .nav-tab { padding: 8px 14px; font-size: 11px; }
  .logo { font-size: 22px; }
  .section-title { font-size: 28px; }
  .hero-detail-modal, .item-detail-modal { width: 95%; max-height: 85vh; }
  .detail-header, .item-detail-header { flex-direction: column; text-align: center; gap: 16px; }
  .items-category-tabs { justify-content: center; }
  .weapon-grid { grid-template-columns: 1fr; }
  .base-stats-grid { grid-template-columns: repeat(2, 1fr); }
  .ability-params { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .heroes-grid, .items-grid { grid-template-columns: repeat(3, 1fr); }
  .nav { display: none; }
  .header { padding: 12px 16px; }
  .main-content { padding: 24px 16px; }
  .base-stats-grid { grid-template-columns: repeat(2, 1fr); }
}

<!-- Comet Background Canvas -->
<canvas id="cometCanvas" style="position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 1;"></canvas>
<script>
(function() {
  const canvas = document.getElementById('cometCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Comet class - REFINED (smaller, softer, no rectangular trail)
  class Comet {
    constructor() {
      this.reset();
    }

    reset() {
      this.x = Math.random() * canvas.width;
      this.y = -50;

      const angle = (Math.random() * 50 + 65) * Math.PI / 180;
      const speed = Math.random() * 1.5 + 1.2; // 1.2 - 2.7 px/frame (slower)

      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;

      this.size = Math.random() * 1.2 + 0.8; // 0.8-2.0px head (smaller)
      this.trailLength = Math.random() * 60 + 40; // 40-100px trail (shorter)
      this.opacity = Math.random() * 0.15 + 0.35; // 35-50% opacity (softer)
      this.life = 0;
      this.maxLife = (canvas.height + 100) / this.vy;

      this.hue = Math.random() * 45 + 195; // 195-240 (blue to cyan)
      this.saturation = Math.random() * 20 + 50; // 50-70% saturation (less neon)
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life++;

      if (this.y > canvas.height + 50 || this.x < -50 || this.x > canvas.width + 50) {
        this.reset();
        this.y = -1000 - Math.random() * 2000;
      }
    }

    draw() {
      const progress = this.life / this.maxLife;
      const fadeIn = Math.min(progress * 5, 1);
      const fadeOut = progress > 0.8 ? (1 - progress) * 5 : 1;
      const currentOpacity = this.opacity * fadeIn * fadeOut;

      if (currentOpacity <= 0) return;

      // Soft radial trail using multiple circles (no rectangular line)
      const steps = 20;
      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const tx = this.x - this.vx * this.trailLength * t;
        const ty = this.y - this.vy * this.trailLength * t;

        // Trail width tapers from head to tail
        const trailWidth = this.size * (1 - t * 0.7) * 2;
        const trailOpacity = currentOpacity * (1 - t * t) * 0.6;

        if (trailOpacity <= 0) continue;

        const grad = ctx.createRadialGradient(tx, ty, 0, tx, ty, trailWidth * 3);
        grad.addColorStop(0, `hsla(${this.hue}, ${this.saturation}%, 90%, ${trailOpacity})`);
        grad.addColorStop(0.5, `hsla(${this.hue}, ${this.saturation}%, 80%, ${trailOpacity * 0.4})`);
        grad.addColorStop(1, `hsla(${this.hue}, ${this.saturation}%, 70%, 0)`);

        ctx.beginPath();
        ctx.arc(tx, ty, trailWidth * 3, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      // Head glow - softer, smaller
      const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 5);
      glow.addColorStop(0, `hsla(${this.hue}, 25%, 100%, ${currentOpacity * 0.9})`);
      glow.addColorStop(0.4, `hsla(${this.hue}, 50%, 85%, ${currentOpacity * 0.4})`);
      glow.addColorStop(1, `hsla(${this.hue}, 70%, 65%, 0)`);

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Head core
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 15%, 98%, ${currentOpacity})`;
      ctx.fill();

      // Tiny bright center
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${currentOpacity * 0.8})`;
      ctx.fill();
    }
  }

  // Shooting star class - REFINED
  class ShootingStar {
    constructor() {
      this.reset();
    }

    reset() {
      this.x = Math.random() * canvas.width;
      this.y = -20;
      const angle = (Math.random() * 45 + 67) * Math.PI / 180;
      const speed = Math.random() * 3 + 2.5; // 2.5-5.5 px/frame
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.trailLength = Math.random() * 35 + 25; // 25-60px trail
      this.opacity = Math.random() * 0.15 + 0.35; // 35-50% opacity
      this.life = 0;
      this.maxLife = (canvas.height + 50) / this.vy;
      this.hue = Math.random() * 35 + 175; // 175-210
      this.width = Math.random() * 1.2 + 0.6; // 0.6-1.8px
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life++;
      if (this.y > canvas.height + 30 || this.x < -30 || this.x > canvas.width + 30) {
        this.reset();
        this.y = -500 - Math.random() * 3000;
      }
    }

    draw() {
      const progress = this.life / this.maxLife;
      const fadeIn = Math.min(progress * 8, 1);
      const fadeOut = progress > 0.85 ? (1 - progress) * 6.67 : 1;
      const currentOpacity = this.opacity * fadeIn * fadeOut;
      if (currentOpacity <= 0) return;

      // Soft line with rounded caps
      const gradient = ctx.createLinearGradient(
        this.x - this.vx * this.trailLength,
        this.y - this.vy * this.trailLength,
        this.x, this.y
      );
      gradient.addColorStop(0, `hsla(${this.hue}, 85%, 75%, 0)`);
      gradient.addColorStop(0.4, `hsla(${this.hue}, 85%, 88%, ${currentOpacity * 0.15})`);
      gradient.addColorStop(0.8, `hsla(${this.hue}, 70%, 94%, ${currentOpacity * 0.5})`);
      gradient.addColorStop(1, `hsla(${this.hue}, 40%, 100%, ${currentOpacity})`);

      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - this.vx * this.trailLength, this.y - this.vy * this.trailLength);
      ctx.lineWidth = this.width;
      ctx.strokeStyle = gradient;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();

      // Soft head glow
      const headGlow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 4);
      headGlow.addColorStop(0, `hsla(${this.hue}, 25%, 100%, ${currentOpacity * 0.8})`);
      headGlow.addColorStop(0.6, `hsla(${this.hue}, 60%, 85%, ${currentOpacity * 0.3})`);
      headGlow.addColorStop(1, `hsla(${this.hue}, 80%, 70%, 0)`);

      ctx.beginPath();
      ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = headGlow;
      ctx.fill();

      // Head
      ctx.beginPath();
      ctx.arc(this.x, this.y, 1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${currentOpacity * 0.9})`;
      ctx.fill();
    }
  }

  const comets = [];
  const shootingStars = [];

  // 3-4 comets
  const cometCount = Math.floor(Math.random() * 2) + 3;
  for (let i = 0; i < cometCount; i++) {
    const c = new Comet();
    c.y = -Math.random() * 3000;
    comets.push(c);
  }

  // 5-7 shooting stars
  const starCount = Math.floor(Math.random() * 3) + 5;
  for (let i = 0; i < starCount; i++) {
    const s = new ShootingStar();
    s.y = -Math.random() * 5000;
    shootingStars.push(s);
  }

  // Background stars
  const bgStars = [];
  for (let i = 0; i < 150; i++) {
    bgStars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.3,
      opacity: Math.random() * 0.4 + 0.15,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }

  let time = 0;

  function animate() {
    time++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    bgStars.forEach(star => {
      const twinkle = Math.sin(time * star.twinkleSpeed + star.twinkleOffset) * 0.3 + 0.7;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(205, 215, 235, ${star.opacity * twinkle * 0.7})`;
      ctx.fill();
    });

    comets.forEach(comet => {
      comet.update();
      comet.draw();
    });

    shootingStars.forEach(star => {
      star.update();
      star.draw();
    });

    requestAnimationFrame(animate);
  }

  animate();
})();
</script>

(function() {
  const loader = document.getElementById('pageLoader');
  if (!loader) return;

  function hideLoader() {
    loader.classList.add('hidden');
    setTimeout(() => {
      if (loader.parentNode) loader.parentNode.removeChild(loader);
    }, 700);
  }

  function showLoader() {
    loader.classList.remove('hidden');
  }

  if (document.readyState === 'complete') {
    setTimeout(hideLoader, 1000);
  } else {
    window.addEventListener('load', () => setTimeout(hideLoader, 1000));
  }

  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      showLoader();
      setTimeout(hideLoader, 1000);
    }
  });
})();

// Generate scattered emoji pattern with 6-8 small emojis around avatar
function generateEmojiPattern(emoji) {
  if (!emoji) return '';
  const positions = [
    {t: '6%', l: '12%'}, {t: '8%', l: '85%'},
    {t: '42%', l: '8%'}, {t: '45%', l: '88%'},
    {t: '82%', l: '18%'}, {t: '85%', l: '78%'},
    {t: '78%', l: '45%'}, {t: '88%', l: '55%'}
  ];
  let html = '<div class="emoji-pattern">';
  positions.forEach((pos, i) => {
    const size = 18 + (i % 3) * 3;
    const rot = ((i * 13) % 30) - 15;
    const op = 0.18 + (i % 3) * 0.03;
    html += `<span class="emoji-dot" style="top:${pos.t};left:${pos.l};font-size:${size.toFixed(1)}px;transform:rotate(${rot}deg);opacity:${op.toFixed(2)}">${emoji}</span>`;
  });
  html += '</div>';
  return html;
}

function getItemImage(name) {
  return itemImages[name] || null;
}

function getItemInitials(name) {
  const words = name.split(/[\s\-&]+/).filter(w => w.length > 0);
  if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
  return name.substring(0, 2).toUpperCase();
}

function renderItemIcon(name, category) {
  const imgUrl = getItemImage(name);
  if (imgUrl) {
    return `<img src="${imgUrl}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='${getItemInitials(name)}';">`;
  }
  return getItemInitials(name);
}

const heroesContainer = document.getElementById('heroesContainer');
const roleTabsContainer = document.getElementById('roleTabs');
const detailModal = document.getElementById('detailModal');
const overlay = document.getElementById('overlay');
const modalContent = document.getElementById('modalContent');
let selectedHero = null;
let currentRole = 'all';

const roleColors = {
  'Tank': '#607d8b',
  'Fighter': '#ef6c00',
  'Marksman': '#e53935',
  'Assassin': '#8e24aa',
  'Mage': '#00acc1',
  'Support': '#43a047'
};

const roleOrder = ['Tank', 'Fighter', 'Marksman', 'Assassin', 'Mage', 'Support'];

function renderRoleTabs() {
  const roles = ['all', ...roleOrder];
  roleTabsContainer.innerHTML = '';
  roles.forEach(role => {
    const btn = document.createElement('button');
    btn.className = 'role-tab' + (role === currentRole ? ' active' : '');
    btn.dataset.role = role;
    btn.textContent = role === 'all' ? 'Все' : role;
    if (role === currentRole && role !== 'all') {
      btn.style.borderColor = roleColors[role] + '60';
      btn.style.color = roleColors[role];
      btn.style.background = roleColors[role] + '15';
      btn.style.boxShadow = '0 0 15px ' + roleColors[role] + '15';
    }
    btn.addEventListener('click', () => {
      currentRole = role;
      renderRoleTabs();
      renderHeroes();
    });
    roleTabsContainer.appendChild(btn);
  });
}

function renderHeroes() {
  heroesContainer.innerHTML = '';
  if (currentRole === 'all') {
    renderHeroesAll();
  } else {
    renderHeroesFiltered();
  }
}

function renderHeroesAll() {
  const grid = document.createElement('div');
  grid.className = 'heroes-grid';
  heroes.forEach((hero, idx) => {
    grid.appendChild(createHeroCard(hero, idx));
  });
  heroesContainer.appendChild(grid);

  const subtitle = document.querySelector('#heroesSection .section-subtitle');
  if (subtitle) subtitle.innerHTML = 'Всего <span class="hero-count">38</span> playable characters в текущей версии игры';
}

function renderHeroesFiltered() {
  const filtered = heroes.map((h, i) => ({ hero: h, idx: i })).filter(({ hero }) => hero.roles ? hero.roles.includes(currentRole) : hero.role === currentRole);
  const color = roleColors[currentRole];

  const section = document.createElement('div');
  section.className = 'role-section';

  const header = document.createElement('div');
  header.className = 'role-section-header';
  header.innerHTML = `
    <div class="role-section-title" style="color: ${color};">${currentRole}</div>
    <div class="role-section-count" style="color: ${color};">${filtered.length}</div>
    <div class="role-section-divider"></div>
  `;
  section.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'heroes-grid';
  filtered.forEach(({ hero, idx }) => {
    grid.appendChild(createHeroCard(hero, idx));
  });
  section.appendChild(grid);
  heroesContainer.appendChild(section);

  const subtitle = document.querySelector('#heroesSection .section-subtitle');
  if (subtitle) subtitle.innerHTML = 'Показано <span class="hero-count" style="color: ' + color + ';">' + filtered.length + '</span> из 38 персонажей';
}

function openDetail(hero, cardElement) {
  document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('selected'));
  cardElement.classList.add('selected');
  selectedHero = hero;

  // Check if hero has detailed data (like Abrams)
  if (hero.weapon && hero.abilities && hero.abilities[0].params) {
    renderDetailedModal(hero);
  } else {
    renderSimpleModal(hero);
  }

  document.querySelector('.modal-scroll-wrapper').scrollTop = 0;
  detailModal.classList.add('open');
  overlay.classList.add('active');
}

function closeDetail() {
  detailModal.classList.remove('open');
  overlay.classList.remove('active');
  document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('selected'));
  selectedHero = null;
}

// ==================== ITEMS RENDER ====================
const itemsContainer = document.getElementById('itemsContainer');
const itemDetailModal = document.getElementById('itemDetailModal');
const itemModalContent = document.getElementById('itemModalContent');
let currentItemCategory = 'all';

function renderItems(category, searchQuery = '') {
  currentItemCategory = category;
  const tiers = [800, 1600, 3200, 6400];
  const tierNames = { 800: "Tier 1", 1600: "Tier 2", 3200: "Tier 3", 6400: "Tier 4" };

  itemsContainer.innerHTML = '';

  // Handle "all" category - show all items grouped by type
  if (category === 'all') {
    const categories = ['weapon', 'vitality', 'spirit'];
    const catColors = { weapon: '#c9a96e', vitality: '#4caf50', spirit: '#b388ff' };
    const catLabels = { weapon: 'Weapon', vitality: 'Vitality', spirit: 'Spirit' };

    let hasAnyResults = false;

    categories.forEach(cat => {
      const data = itemsData[cat];
      let catHasResults = false;

      const catSection = document.createElement('div');
      catSection.className = 'category-section';

      // Category header
      const catHeader = document.createElement('div');
      catHeader.className = 'tier-header';
      catHeader.style.marginBottom = '20px';
      catHeader.style.marginTop = '10px';
      catHeader.innerHTML = `
        <div class="tier-label" style="color: ${catColors[cat]};">${catLabels[cat]}</div>
        <div class="tier-divider"></div>
      `;
      catSection.appendChild(catHeader);

      const catGrid = document.createElement('div');
      catGrid.className = 'items-grid';

      tiers.forEach(tier => {
        const items = data.tiers[tier];
        if (!items || items.length === 0) return;

        items.forEach((item) => {
          // Search filter: match by partial name (first letters or any part)
          const itemNameLower = item.name.toLowerCase();
          const queryLower = searchQuery.toLowerCase().trim();

          if (queryLower && !itemNameLower.includes(queryLower)) {
            return;
          }

          catHasResults = true;
          hasAnyResults = true;

          const card = document.createElement('div');
          card.className = `item-card ${cat}`;
          if (searchQuery) card.classList.add('search-match');
          card.innerHTML = `
            <div class="item-card-inner">
              <div class="item-icon-wrap ${cat}">${renderItemIcon(item.name, cat)}</div>
              <div class="item-name">${item.name}</div>
              <div class="item-cost ${cat}">${tier} Souls</div>
            </div>
          `;
          card.addEventListener('click', () => openItemDetail(item, cat, tier));
          catGrid.appendChild(card);
        });
      });

      if (catHasResults) {
        catSection.appendChild(catGrid);
        itemsContainer.appendChild(catSection);
      }
    });

    // Show "no results" message if search returned nothing
    if (searchQuery && !hasAnyResults) {
      const noResults = document.createElement('div');
      noResults.className = 'no-results';
      noResults.innerHTML = 'Предметы не найдены';
      itemsContainer.appendChild(noResults);
    }

    return;
  }

  // Regular category rendering (weapon/vitality/spirit)
  const data = itemsData[category];

  tiers.forEach(tier => {
    const items = data.tiers[tier];
    if (!items || items.length === 0) return;

    const tierSection = document.createElement('div');
    tierSection.className = 'tier-section';

    const header = document.createElement('div');
    header.className = 'tier-header';
    header.innerHTML = `
      <div class="tier-label" style="color: ${data.color};">${tierNames[tier]}</div>
      <div class="tier-cost">${tier} Souls</div>
      <div class="tier-divider"></div>
    `;
    tierSection.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'items-grid';

    items.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = `item-card ${category}`;
      card.innerHTML = `
        <div class="item-card-inner">
          <div class="item-icon-wrap ${category}">${renderItemIcon(item.name, category)}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-cost ${category}">${tier} Souls</div>
        </div>
      `;
      card.addEventListener('click', () => openItemDetail(item, category, tier));
      grid.appendChild(card);
    });

    tierSection.appendChild(grid);
    itemsContainer.appendChild(tierSection);
  });
}

function openItemDetail(item, category, cost) {
  const data = itemsData[category];
  itemDetailModal.className = `item-detail-modal ${category}-modal`;

  itemModalContent.innerHTML = `
    <div class="item-detail-header">
      <div class="item-detail-icon ${category}">${renderItemIcon(item.name, category)}</div>
      <div class="item-detail-info">
        <div class="item-detail-name ${category}">${item.name}</div>
        <div class="item-detail-meta">
          <div class="item-detail-category ${category}">${category === 'weapon' ? 'Weapon' : category === 'vitality' ? 'Vitality' : 'Spirit'}</div>
          <div class="item-detail-cost">${cost} Souls</div>
        </div>
      </div>
    </div>
    <div class="item-detail-body">
      <div class="item-detail-section-title ${category}">Описание</div>
      <div class="item-detail-desc">${item.desc}</div>
      <div class="item-detail-section-title ${category}">Тип</div>
      <div class="item-detail-stat">
        <div class="item-detail-stat-label">Активация</div>
        <div class="item-detail-stat-value ${category}">${item.type}</div>
      </div>
      <div class="item-detail-stat">
        <div class="item-detail-stat-label">Стоимость</div>
        <div class="item-detail-stat-value ${category}">${cost} Souls</div>
      </div>
      <div class="item-detail-stat">
        <div class="item-detail-stat-label">Категория</div>
        <div class="item-detail-stat-value ${category}">${category === 'weapon' ? 'Оружие' : category === 'vitality' ? 'Выживаемость' : 'Дух'}</div>
      </div>
    </div>
  `;

  itemDetailModal.scrollTop = 0;
  itemDetailModal.classList.add('open');
  overlay.classList.add('active');
}

function closeItemDetail() {
  itemDetailModal.classList.remove('open');
  overlay.classList.remove('active');
}

// ==================== NAVIGATION ====================
const navTabs = document.querySelectorAll('.nav-tab');
const heroesSection = document.getElementById('heroesSection');
const itemsSection = document.getElementById('itemsSection');
const itemsTitle = document.getElementById('itemsTitle');

function moveGlider(activeTab) {
  const glider = document.querySelector('.nav-glider');
  if (!glider || !activeTab) return;
  const nav = document.querySelector('.nav');
  const navRect = nav.getBoundingClientRect();
  const tabRect = activeTab.getBoundingClientRect();
  const width = tabRect.width;
  const left = tabRect.left - navRect.left;
  if (width > 10) {
    glider.style.opacity = '1';
    glider.style.width = width + 'px';
    glider.style.left = left + 'px';
  }
}

navTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const section = tab.dataset.section;
    navTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    moveGlider(tab);

    heroesSection.classList.remove('section-animate');
    itemsSection.classList.remove('section-animate');

    if (section === 'heroes') {
      heroesSection.style.display = 'block';
      itemsSection.classList.remove('active');
      // OPTIMIZED: removed void offsetWidth forced reflow (was causing 300ms+ lag)
      requestAnimationFrame(() => {
        heroesSection.classList.add('section-animate');
      });
    } else if (section === 'items') {
      heroesSection.style.display = 'none';
      itemsSection.classList.add('active');
      // Ensure 'all' tab is active and search is visible when entering items
      catTabs.forEach(t => t.classList.remove('active'));
      const allTab = document.querySelector('.cat-tab[data-cat="all"]');
      if (allTab) allTab.classList.add('active');
      if (itemsSearchContainer) itemsSearchContainer.classList.add('visible');
      itemsTitle.style.color = '#c9a96e';
      renderItems('all');
      // OPTIMIZED: removed void offsetWidth forced reflow
      requestAnimationFrame(() => {
        itemsSection.classList.add('section-animate');
      });
    } else {
      heroesSection.style.display = 'none';
      itemsSection.classList.remove('active');
    }
  });
});

// ==================== CATEGORY TABS ====================
const catTabs = document.querySelectorAll('.cat-tab');
const itemsSearchContainer = document.getElementById('itemsSearchContainer');
const itemsSearch = document.getElementById('itemsSearch');

catTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const cat = tab.dataset.cat;
    catTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    if (cat === 'all') itemsTitle.style.color = '#c9a96e';
    else if (cat === 'weapon') itemsTitle.style.color = '#c9a96e';
    else if (cat === 'vitality') itemsTitle.style.color = '#4caf50';
    else if (cat === 'spirit') itemsTitle.style.color = '#9e9eaa';

    // Show search only for "all" tab
    if (cat === 'all') {
      itemsSearchContainer.classList.add('visible');
    } else {
      itemsSearchContainer.classList.remove('visible');
      itemsSearch.value = '';
    }

    renderItems(cat);
  });
});

// ==================== ITEMS SEARCH ====================
if (itemsSearch) {
  itemsSearch.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    if (currentItemCategory === 'all') {
      renderItems('all', query);
    }
  });
}

// ==================== OVERLAY & ESCAPE ====================
overlay.addEventListener('click', () => {
  closeDetail();
  closeItemDetail();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeDetail();
    closeItemDetail();
  }
});

// ==================== INIT ====================
renderRoleTabs();
renderHeroes();
heroesSection.classList.add('section-animate');

function initGlider() {
  const initialTab = document.querySelector('.nav-tab.active');
  if (!initialTab) return;
  moveGlider(initialTab);
}

function scheduleGliderInit() {
  initGlider();
  requestAnimationFrame(() => {
    initGlider();
    setTimeout(initGlider, 50);
    setTimeout(initGlider, 150);
    setTimeout(initGlider, 300);
  });
}

if (document.readyState === 'complete') {
  scheduleGliderInit();
} else {
  window.addEventListener('load', scheduleGliderInit);
}

window.addEventListener('resize', () => {
  const activeTab = document.querySelector('.nav-tab.active');
  if (activeTab) moveGlider(activeTab);
});
</script>
